<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Date Termin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-card">
        <div class="floating-hearts floating-hearts-subtle" aria-hidden="true">
          <span>❤</span>
          <span>❤</span>
        </div>
        <p class="eyebrow">Level 2</p>
        <h1>Hallo Elvira. Oha. Das wird ja wirklich cute.</h1>
        <p class="hero-copy">Nur noch ein Termin, dann ist das hier offiziell ein sehr starkes Match.</p>

        <div class="gif-strip gif-strip-single" aria-label="Celebration gif">
          <iframe
            class="gif-frame"
            src="https://tenor.com/embed/15064057413633942575"
            allowfullscreen
            loading="lazy"
            title="Cat dance gif"
          ></iframe>
        </div>
      </section>

      <section class="booking-panel booking-panel-wide">
        <div class="panel-header">
          <p class="panel-kicker">Terminwahl</p>
          <h2>Such dir Datum und Uhrzeit aus</h2>
          <p>Wenn nichts passt, mach einfach einen Gegenvorschlag. Ich bin romantisch und verhandlungsbereit.</p>
        </div>

        <form
          class="booking-form"
          id="booking-form"
          action="https://formsubmit.co/artur.renner6@gmail.com"
          method="POST"
        >
          <input type="hidden" name="_subject" value="DatingAppointment - Neue Antwort von Elvira" />
          <input type="hidden" name="_template" value="table" />
          <input
            type="hidden"
            name="_next"
            value="https://pleonastic6.github.io/DatingAppointment/thanks.html"
          />

          <label class="field">
            <span>Wunsch-Date-Idee</span>
            <select name="idea" required>
              <option value="">Bitte waehlen</option>
              <option>Kaffee und Spaziergang</option>
              <option>Drinks mit Main-Character-Energie</option>
              <option>Eis und unvernunftig gute Gespraeche</option>
              <option>Arcade / Minigolf / leicht kompetitiv</option>
            </select>
          </label>

          <div class="datetime-grid">
            <label class="field">
              <span>Datum</span>
              <input type="date" name="date" required />
            </label>

            <label class="field">
              <span>Uhrzeit</span>
              <input type="time" name="time" required />
            </label>
          </div>

          <label class="field">
            <span>Kommentar oder Gegenangebot</span>
            <textarea
              name="note"
              rows="4"
              placeholder="z. B. Samstag klingt cute, aber nur mit Dessert"
            ></textarea>
          </label>

          <input
            type="text"
            name="_honey"
            tabindex="-1"
            autocomplete="off"
            class="honeypot-field"
          />

          <button class="submit-button" type="submit">Date fix machen</button>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
