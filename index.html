<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entwurf fuer uns beide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <p class="eyebrow">work in progress</p>
        <h1>Eine Textbox. Mehr brauchen wir gerade nicht.</h1>
        <p class="intro">
          Alles andere war zu viel. Wir bauen das jetzt langsam und fuellen den Inhalt
          Schritt fuer Schritt.
        </p>

        <label class="editor" for="draft">
          <span>Text</span>
          <textarea
            id="draft"
            name="draft"
            rows="14"
            placeholder="Hier kommt der Text rein. Erst roh, dann gut."
            autofocus
          ></textarea>
        </label>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
