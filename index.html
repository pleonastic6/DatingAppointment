<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Date?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="single-screen">
      <section class="invite-card">
        <div class="floating-hearts" aria-hidden="true">
          <span>❤</span>
          <span>❤</span>
          <span>❤</span>
        </div>
        <p class="eyebrow">Incoming Date Request</p>
        <h1>Lust auf ein Date mit mir?</h1>
        <p class="hero-copy">Ganz simpel. Nur eine kleine, wichtige Frage.</p>

        <div class="gif-strip" aria-label="Lustige Reactions">
          <iframe
            class="gif-frame"
            src="https://tenor.com/embed/9038485966722291030"
            allowfullscreen
            loading="lazy"
            title="Kitty hug gif"
          ></iframe>
          <iframe
            class="gif-frame"
            src="https://giphy.com/embed/26ufcYAkp8e66vanu"
            allowfullscreen
            loading="lazy"
            title="Cute reaction gif"
          ></iframe>
        </div>

        <div class="decision-zone decision-zone-large" id="decision-zone">
          <p class="decision-question">Ein Button ist ehrlich. Der andere eher sportlich.</p>
          <div class="decision-buttons decision-buttons-large">
            <button class="yes-button" id="yes-button" type="button">Ja 💌</button>
            <button class="no-button" id="no-button" type="button">Nein</button>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
